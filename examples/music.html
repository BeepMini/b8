<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<title>Music</title>
	<meta name="description" content="Generate songs with code.">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

	<link rel="stylesheet" href="example.css">
	<script src="../dist/b8.js"></script>
</head>

<body>
	<style>
		#music-app {
			display: flex;
			flex-direction: column;
			gap: 1rem;
		}
	</style>

	<div id="music-app"></div>
</body>

<script>
	const initialSeed = 46605;
	const songName = 'song';
	const playText = 'Generate and Play Song';

	const songStyles = [
		'calm',
		'arcade',
		'busy',
		'adventure',
		'puzzle',
		'shooter'
	];

	let html = '';

	html += `<div class="flex">`;
	html += `<label for="song-style">Style</label>`;
	html += `<select id="song-style">`;
	html += songStyles.map( style => `<option value="${style}">${style}</option>` ).join( '' );
	html += `</select>`;
	html += `</div>`;

	html += `<div class="flex">`;
	html += `<input type="text" id="song-seed" value="${initialSeed}">`;
	html += `<button id="random-seed">Random Seed</button>`;
	html += `</div>`;

	html += `<button id="play-music">${playText}</button>`;
	html += `<pre id="song-info"></pre>`;

	const playSong = function() {

		const playButton = document.getElementById( 'play-music' );

		if ( b8.Music.isPlaying( songName ) ) {
			b8.Music.stop();
			playButton.textContent = playText;
			return;
		}

		playButton.textContent = 'Stop Song';

		const seed = document.getElementById( 'song-seed' ).value;
		const style = document.getElementById( 'song-style' ).value;

		console.log( 'Generating song with seed:', seed, 'and style:', style );

		const song = b8.Music.generate( {
			seed,
			style
		} );

		b8.Music.play( song );

		document.querySelector( '#song-info' ).textContent = JSON.stringify(
			b8.Music.currentSongProperties,
			null,
			2
		);

	};

	document.getElementById( 'music-app' ).innerHTML = html;
	document.getElementById( 'play-music' ).addEventListener( 'click', playSong );
	document.getElementById( 'random-seed' ).addEventListener( 'click', () => {
		document.getElementById( 'song-seed' ).value = Math.floor( Math.random() * 100000 );
	} );
</script>
